<header
        th:fragment="header"
        xmlns:th="http://www.thymeleaf.org"
        class="w-full bg-emerald-900 flex flex-col justify-center"
>
    <div class="bg-[#005b4b] text-white w-full flex flex-col">
        <div class="mx-auto flex max-w-[1600px] items-center justify-between gap-8 px-12 py-8">
            <form th:action="@{/tim-kiem}" method="get" class="w-92.5 shrink-0">
                <div class="flex h-14 items-center rounded bg-white/92 px-4 shadow-sm">
                    <input
                            name="q"
                            type="text"
                            placeholder="Tìm kiếm sản phẩm..."
                            class="h-full w-full border-none bg-transparent text-[18px] text-neutral-700 placeholder:text-neutral-400 focus:outline-none"
                    />
                    <button type="submit" class="ml-3 text-neutral-500" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
                        </svg>
                    </button>
                </div>
            </form>

            <a th:href="@{/}" class="flex-1 text-center leading-none text-white no-underline">
                <h1 class="brand-font text-[68px] font-semibold tracking-[0.08em]">PARFUMERIE</h1>
                <p class="brand-font mt-1 text-[20px] tracking-[0.05em] text-white/90">Magic Of Your Emotions</p>
            </a>

            <div class="flex items-center gap-8">
                <div class="border-r border-white/40 pr-8 text-right leading-tight">
                    <p class="text-[18px] font-semibold">Xin chào, Khách</p>
                    <p class="mt-2 text-[16px]">
                        <a href="#" class="font-bold hover:underline">Đăng nhập</a>
                        <span class="font-normal text-white/85"> hoặc </span>
                        <a href="#" class="font-bold hover:underline">Đăng ký</a>
                    </p>
                </div>

                <a th:href="@{/yeu-thich}" class="text-white transition hover:scale-105" aria-label="Wishlist" title="Sản phẩm yêu thích">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12.1 21.35 10.55 19.94C5.4 15.27 2 12.19 2 8.41 2 5.33 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6.02 6.02 0 0 1 16.5 3C19.58 3 22 5.33 22 8.41c0 3.78-3.4 6.86-8.55 11.54l-1.35 1.4Z"/>
                    </svg>
                </a>

                <a th:href="@{/gio-hang}" class="relative text-white transition hover:scale-105" aria-label="Cart" title="Giỏ hàng">
                    <span id="headerCartCount" class="absolute -right-2 -top-3 flex h-7 w-7 items-center justify-center rounded-full bg-red-500 text-[14px] font-bold">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-11 w-11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.9">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h2l2.2 10.2a1 1 0 0 0 1 .8h9.8a1 1 0 0 0 1-.76L21 7H7"/>
                        <circle cx="10" cy="19" r="1.3" fill="currentColor" stroke="none"/>
                        <circle cx="18" cy="19" r="1.3" fill="currentColor" stroke="none"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <nav class="relative z-50 border-t border-[#b94f4f] bg-white shadow-sm">
        <div class="mx-auto flex max-w-[1600px] items-center justify-center gap-16 px-8 py-5 text-[20px] uppercase tracking-[0.02em] text-black">
            <a th:href="@{/}" class="font-extrabold hover:text-[#005b4b]">Trang chủ</a>
            <a href="#" class="hover:text-[#005b4b]">Giới thiệu</a>

            <div class="group relative py-1">
                <a th:href="@{/tim-kiem}" class="font-bold hover:text-[#005b4b]">Thương hiệu <span class="ml-1">›</span></a>
                <div class="invisible absolute left-1/2 top-full z-50 w-[90vw] max-w-[1450px] -translate-x-1/2 rounded-b-2xl border border-gray-100 bg-white px-8 py-7 text-left normal-case opacity-0 shadow-2xl transition duration-150 group-hover:visible group-hover:opacity-100">
                    <div th:if="${navBrands != null and !navBrands.isEmpty()}" style="column-count: 5; column-gap: 4rem;">
                        <a th:each="brand : ${navBrands}"
                           th:href="${brand.url}"
                           th:text="${brand.name}"
                           class="mb-3 block break-inside-avoid text-[16px] font-normal uppercase tracking-normal text-black hover:text-[#005b4b] hover:underline">DIOR</a>
                    </div>
                    <p th:if="${navBrands == null or navBrands.isEmpty()}" class="text-[16px] normal-case text-gray-500">Chưa có thương hiệu. Hãy thêm trong trang admin.</p>
                </div>
            </div>

            <div class="group relative py-1">
                <a th:href="@{/tim-kiem}" class="hover:text-[#005b4b]">Nước hoa <span class="ml-1">›</span></a>
                <div class="invisible absolute left-0 top-full z-50 min-w-[280px] rounded-b-xl border border-gray-100 bg-white py-2 text-left normal-case opacity-0 shadow-xl transition duration-150 group-hover:visible group-hover:opacity-100">
                    <a th:each="category : ${navCategories}"
                       th:href="${category.url}"
                       th:text="${category.name}"
                       class="block whitespace-nowrap px-6 py-3 text-[16px] tracking-normal text-gray-700 hover:bg-gray-50 hover:text-[#005b4b]">Nước hoa Nam</a>
                    <p th:if="${navCategories == null or navCategories.isEmpty()}" class="whitespace-nowrap px-6 py-3 text-[16px] text-gray-500">Chưa có danh mục</p>
                </div>
            </div>

            <div class="group relative py-1">
                <a th:href="@{/tim-kiem}" class="hover:text-[#005b4b]">Nước hoa chiết <span class="ml-1">›</span></a>
                <div class="invisible absolute left-0 top-full z-50 min-w-[280px] rounded-b-xl border border-gray-100 bg-white py-2 text-left normal-case opacity-0 shadow-xl transition duration-150 group-hover:visible group-hover:opacity-100">
                    <a th:href="@{/tim-kiem(q='Nước hoa chiết Nam')}" class="block whitespace-nowrap px-6 py-3 text-[16px] tracking-normal text-gray-700 hover:bg-gray-50 hover:text-[#005b4b]">Nước hoa chiết Nam</a>
                    <a th:href="@{/tim-kiem(q='Nước hoa chiết Nữ')}" class="block whitespace-nowrap px-6 py-3 text-[16px] tracking-normal text-gray-700 hover:bg-gray-50 hover:text-[#005b4b]">Nước hoa chiết Nữ</a>
                </div>
            </div>

            <a href="#" class="hover:text-[#005b4b]">Kiến thức</a>
            <a href="#" class="hover:text-[#005b4b]">Blog</a>
            <a href="#" class="hover:text-[#005b4b]">Liên hệ</a>
        </div>
    </nav>
    <script src="/js/long-header-cart.js" defer></script>
</header>
