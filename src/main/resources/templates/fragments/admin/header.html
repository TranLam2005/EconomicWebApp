<header
        th:fragment="header"
        class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 z-10">
  <div class="flex items-center w-96">
    <div class="relative w-full">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
      <input type="text" class="w-full pl-10 pr-4 py-2 bg-gray-100 border-transparent rounded-lg focus:bg-white focus:border-[#07503D] focus:ring-2 focus:ring-[#07503D]/20 outline-none transition-all text-sm" placeholder="Tìm kiếm...">
    </div>
  </div>

  <div class="flex items-center space-x-4">
    <button class="relative p-2 text-gray-400 hover:text-[#07503D] transition-colors rounded-full hover:bg-gray-100">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
      <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
    </button>
    <div class="flex items-center gap-3 border-l border-gray-200 pl-4 cursor-pointer">
      <img src="https://ui-avatars.com/api/?name=Admin&background=07503D&color=fff" alt="Avatar" class="w-9 h-9 rounded-full shadow-sm">
      <div class="hidden md:block text-sm">
        <p class="font-semibold text-gray-700">Admin User</p>
        <p class="text-xs text-gray-500">Quản trị viên</p>
      </div>
    </div>
  </div>
</header>
