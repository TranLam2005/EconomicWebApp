        <div class="flex items-center">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
          <span>Quản lý Sản phẩm</span>

    <a href="#" class="flex items-center px-3 py-2.5 text-white/70 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors group">
      <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>

  </nav>

  <div class="p-4 border-t border-white/10 shrink-0">
    <a href="#" class="flex items-center px-3 py-2 text-white/70 hover:text-white transition-colors">
      <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      Cài đặt
    </a>
  </div>
  <script>
      function toggleSubmenu(submenuId, chevronId) {
          const submenu = document.getElementById(submenuId);
          const chevron = document.getElementById(chevronId);

          // Bật/tắt class hidden để ẩn/hiện menu con
          if (submenu.classList.contains('hidden')) {
              submenu.classList.remove('hidden');
              submenu.classList.add('flex');
              // Xoay mũi tên lên trên
              chevron.classList.add('rotate-180');
          } else {
              submenu.classList.add('hidden');
              submenu.classList.remove('flex');
              // Trả mũi tên về vị trí cũ
              chevron.classList.remove('rotate-180');
          }
      }
  </script>
</aside>
