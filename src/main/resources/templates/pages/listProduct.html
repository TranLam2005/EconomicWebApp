<!DOCTYPE html>
<html
        layout:decorate="~{layout/layoutAdmin}"
        lang="vi"
        xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh Sách Sản Phẩm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<main layout:fragment="content" class="w-full mx-auto bg-gray-50 font-sans text-gray-800 p-6 min-h-screen">

  <div id="notification" class="hidden fixed top-4 right-4 p-4 rounded-lg shadow-lg text-white z-50 max-w-sm"
       role="alert"></div>

  <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Danh sách sản phẩm</h1>
      <p class="text-sm text-gray-500 mt-1">Quản lý các sản phẩm nước hoa trong cửa hàng của bạn.</p>
    </div>
    <a href="/createProduct" class="px-5 py-2 bg-[#07503D] text-white rounded-lg hover:bg-[#053d2e] font-medium transition-colors shadow-sm flex items-center justify-center">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Thêm sản phẩm mới
    </a>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Hình ảnh</th>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Tên sản phẩm</th>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Thương hiệu</th>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Giá bán</th>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Số lượng kho</th>
            <th class="px-6 py-3 text-center text-sm font-semibold text-gray-700">Hành động</th>
          </tr>
        </thead>
        <tbody id="products-table" class="divide-y divide-gray-200" th:if="${products != null and products.size() > 0}">
          <tr class="hover:bg-gray-50 transition-colors" th:each="product : ${products}">
            <td class="px-6 py-4">
              <th:block th:if="${product.images != null and !product.images.isEmpty()}"
                        th:with="mainList=${product.images.?[isMain == true]},
                     mainImg=${mainList.isEmpty() ? product.images[0] : mainList[0]}">
                <img th:src="${mainImg.secureUrl}" th:alt="${product.productName}" class="w-16 h-16 object-cover rounded-lg border border-gray-200">
              </th:block>

              <th:block th:unless="${product.images != null and !product.images.isEmpty()}">
                <div class="w-16 h-16 bg-gray-200 rounded-lg border border-gray-200 flex items-center justify-center">
                  <span class="text-xs text-gray-400">No Image</span>
                </div>
              </th:block>
            </td>
            <td class="px-6 py-4">
              <div>
                <p class="font-medium text-gray-900" th:text="${product.productName}"></p>
                <p class="text-xs text-gray-500" th:text="${product.normalizedKey}"></p>
              </div>
            </td>
            <td class="px-6 py-4 text-sm text-gray-600" th:text="${product.brand}"></td>
            <td class="px-6 py-4 text-sm font-medium text-gray-900">
              <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
            </td>
            <td class="px-6 py-4">
              <div th:if="${product.variants != null and !product.variants.isEmpty()}" class="flex flex-wrap gap-2">

                <div th:each="variant : ${product.variants}"
                     class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium border"
                     th:classappend="${variant.stockQuantity > 0 ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}">

                  <span th:text="${variant.variantName} + ': ' + ${variant.stockQuantity} + ' sp'"></span>

                </div>

              </div>

              <div th:unless="${product.variants != null and !product.variants.isEmpty()}">
              <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">
                Chưa có phân loại
              </span>
              </div>
            </td>
            <td class="px-6 py-4 text-center space-x-2">
              <a th:href="@{/editProduct/{id}(id=${product.id})}" class="inline-flex items-center px-3 py-1 text-sm rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Chỉnh sửa
              </a>
              <button th:onclick="|deleteProduct(${product.id})|" class="inline-flex items-center px-3 py-1 text-sm rounded-lg bg-red-100 text-red-700 hover:bg-red-200 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Xóa
              </button>
            </td>
          </tr>
        </tbody>
        <tbody th:unless="${products != null and products.size() > 0}">
          <tr>
            <td colspan="6" class="px-6 py-8 text-center text-gray-500">
              Chưa có sản phẩm nào. <a href="/createProduct" class="text-[#07503D] hover:underline">Thêm sản phẩm mới</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script>
  const notificationDiv = document.getElementById('notification');

  function showNotification(message, type = 'success') {
    notificationDiv.textContent = message;
    notificationDiv.className = `p-4 rounded-lg shadow-lg text-white z-50 max-w-sm ${
        type === 'success' ? 'bg-green-500' : 'bg-red-500'
    }`;
    notificationDiv.classList.remove('hidden');
    setTimeout(() => notificationDiv.classList.add('hidden'), 4000);
  }

  async function loadProducts() {
    try {
      const response = await fetch('/public/product/list');
      if (!response.ok) throw new Error('Failed to load products');

      const products = await response.json();
      renderProducts(products);
    } catch (error) {
      showNotification('Lỗi tải danh sách sản phẩm: ' + error.message, 'error');
      document.getElementById('products-table').innerHTML = `
        <tr>
          <td colspan="6" class="px-6 py-8 text-center text-red-500">
            Không thể tải danh sách sản phẩm
          </td>
        </tr>
      `;
    }
  }

  function renderProducts(products) {
    if (products.length === 0) {
      document.getElementById('products-table').innerHTML = `
        <tr>
          <td colspan="6" class="px-6 py-8 text-center text-gray-500">
            Chưa có sản phẩm nào. <a href="/createProduct" class="text-[#07503D] hover:underline">Thêm sản phẩm mới</a>
          </td>
        </tr>
      `;
      return;
    }

    const html = products.map(product => {
      const mainImage = product.images && product.images.length > 0
        ? product.images.find(img => img.isMain)?.secureUrl || product.images[0].secureUrl
        : 'https://via.placeholder.com/80';

      const totalStock = product.variants && product.variants.length > 0
        ? product.variants.reduce((sum, v) => sum + (v.stockQuantity || 0), 0)
        : 0;

      const price = product.price || 0;

      return `
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4">
            <img src="${mainImage}" alt="${product.productName}" class="w-16 h-16 object-cover rounded-lg border border-gray-200">
          </td>
          <td class="px-6 py-4">
            <div>
              <p class="font-medium text-gray-900">${product.productName}</p>
              <p class="text-xs text-gray-500">${product.normalizedKey}</p>
            </div>
          </td>
          <td class="px-6 py-4 text-sm text-gray-600">${product.brand}</td>
          <td class="px-6 py-4 text-sm font-medium text-gray-900">
            ${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(price)}
          </td>
          <td class="px-6 py-4">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${
              totalStock > 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
            }">
              ${totalStock} sp
            </span>
          </td>
          <td class="px-6 py-4 text-center space-x-2">
            <a href="/editProduct/${product.id}" class="inline-flex items-center px-3 py-1 text-sm rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 transition-colors">
              <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
              Chỉnh sửa
            </a>
            <button onclick="deleteProduct(${product.id})" class="inline-flex items-center px-3 py-1 text-sm rounded-lg bg-red-100 text-red-700 hover:bg-red-200 transition-colors">
              <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
              Xóa
            </button>
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('products-table').innerHTML = html;
  }

  function deleteProduct(productId) {
    if (confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')) {
      // TODO: Implement delete endpoint
      showNotification('Chức năng xóa sẽ được bổ sung sau', 'error');
    }
  }

  // Load products on page load
  loadProducts();
</script>

</body>
</html>
