<!DOCTYPE html>
<html lang="vi" layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm yêu thích | Parfumerie</title>
</head>
<body layout:fragment="content" class="bg-[#f7f3ed] text-stone-900">
<script src="https://cdn.tailwindcss.com"></script>

<main class="min-h-screen bg-[#f7f3ed]">
    <section class="mx-auto max-w-7xl px-5 pt-10 sm:px-8 lg:px-10">
        <input id="longUserEmail" type="hidden" value="dang@test.com">
        <h1 class="text-3xl font-black tracking-tight text-stone-950 sm:text-4xl">Sản phẩm yêu thích</h1>
    </section>

    <section class="mx-auto max-w-7xl px-5 py-8 sm:px-8 lg:px-10">
        <div class="mb-8 flex flex-col gap-5 md:flex-row md:items-end md:justify-between">
            <div>
                <p class="text-stone-500">Bạn đang có <b id="wishlistCount" class="text-stone-900">0</b> sản phẩm yêu thích.</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="LongWishlistPage.loadWishlist()" class="rounded-full bg-[#005b4b] px-5 py-3 text-sm font-bold text-white transition hover:bg-stone-950">Tải lại</button>
                <a href="/search" class="rounded-full border border-stone-200 bg-white px-5 py-3 text-sm font-bold text-stone-800 transition hover:border-[#005b4b] hover:text-[#005b4b]">Tìm thêm sản phẩm</a>
                <a href="/cart" class="rounded-full border border-stone-200 bg-white px-5 py-3 text-sm font-bold text-stone-800 transition hover:border-[#005b4b] hover:text-[#005b4b]">Xem giỏ hàng</a>
            </div>
        </div>

        <div class="mb-6 rounded-[2rem] border border-stone-200 bg-white p-5 shadow-sm sm:p-6">
            <div class="grid gap-4 sm:grid-cols-[1fr_auto] sm:items-end">
                <label>
                    <span class="mb-2 block text-sm font-bold uppercase tracking-[0.2em] text-stone-400">Thêm nhanh</span>
                    <input id="wishlistProductInput" type="number" value="1" min="1" placeholder="Nhập Product ID" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-stone-900 outline-none transition focus:border-[#005b4b] focus:bg-white focus:ring-4 focus:ring-[#005b4b]/10">
                </label>
                <button onclick="LongWishlistPage.addManualFavorite()" class="rounded-2xl bg-[#005b4b] px-6 py-3 font-extrabold text-white shadow-lg shadow-[#005b4b]/20 transition hover:-translate-y-0.5 hover:bg-stone-950">Thêm yêu thích</button>
            </div>
        </div>

        <div id="wishlistStatus" class="mb-6 rounded-2xl border border-stone-200 bg-stone-50 px-5 py-4 text-sm font-semibold text-stone-700">Chưa tải danh sách yêu thích.</div>

        <div id="wishlistEmpty" class="hidden rounded-[2rem] border border-dashed border-stone-300 bg-white p-10 text-center">
            <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-red-50 text-4xl">♥</div>
            <h3 class="mt-5 text-2xl font-black text-stone-950">Chưa có sản phẩm yêu thích</h3>
            <p class="mt-2 text-stone-500">Hãy tìm nước hoa phù hợp và bấm trái tim để lưu lại.</p>
            <a href="/search" class="mt-6 inline-flex rounded-full bg-[#005b4b] px-6 py-3 font-bold text-white transition hover:bg-stone-950">Tìm sản phẩm</a>
        </div>

        <div id="wishlistGrid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
    </section>
</main>

<script src="/js/long-shop-ui.js"></script>
<script src="/js/long-wishlist-ui.js"></script>
</body>
</html>
