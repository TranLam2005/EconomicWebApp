<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create product list</title>
</head>
<body>
  <h1>Create product list</h1>
  <input type="file" name="files" />
  <button onclick="handleFileUpload()">Upload</button>
  <script>
      async function handleFileUpload() {
          console.log("Upload file product");
          const input = document.querySelector('input[name="files"]');
          if (!input) {
              console.log("No files selected");
              return;
          }
          const files = input.files;
          if (!files.length) {
              console.log("No files selected");
              return;
          }

          const formData = new FormData();
          formData.append("files", files[0]);

          try {
              const response = await fetch("/pub/api/file/product/import", {
                  method: "POST",
                  body: formData,
              });

              if (!response.ok) {
                  console.error("Upload failed:", response.status);
                  return;
              }

              const data = await response.json();
              console.log("Upload successful:", data);
              alert("Upload successful! Total: " + data.totalRows + ", Success: " + data.successRows + ", Failed: " + data.failedRows);
          } catch (error) {
              console.error("Error:", error);
              alert("Upload error: " + error.message);
          }
      }
  </script>
</body>
</html>
