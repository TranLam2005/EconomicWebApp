<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cart Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f6f2ec] text-neutral-900">
<div class="min-h-screen">
    <header class="bg-[#005b4b] px-10 py-8 text-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold tracking-widest">PARFUMERIE</h1>
                <p class="mt-1 text-white/80">Demo giỏ hàng</p>
            </div>
            <div class="flex gap-4">
                <a href="/" class="rounded border border-white/40 px-4 py-2 hover:bg-white/10">Trang chủ</a>
                <a href="/wishlist-demo" class="rounded bg-white px-4 py-2 font-bold text-[#005b4b]">Yêu thích</a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-10 py-10">
        <section class="rounded-2xl bg-white p-8 shadow">
            <h2 class="text-2xl font-bold">Test API giỏ hàng</h2>
            <p class="mt-2 text-neutral-600">
                Trang này gọi API <b>/private/api/cart</b> bằng JWT sau khi login user test.
            </p>

            <div class="mt-6 grid gap-4 md:grid-cols-4">
                <div>
                    <label class="mb-2 block font-semibold">Email</label>
                    <input id="email" value="dang@test.com" class="w-full rounded border px-4 py-3">
                </div>
                <div>
                    <label class="mb-2 block font-semibold">Password</label>
                    <input id="password" value="123456" type="password" class="w-full rounded border px-4 py-3">
                </div>
                <div>
                    <label class="mb-2 block font-semibold">Variant ID</label>
                    <input id="variantId" value="1" type="number" class="w-full rounded border px-4 py-3">
                </div>
                <div>
                    <label class="mb-2 block font-semibold">Số lượng</label>
                    <input id="quantity" value="2" type="number" class="w-full rounded border px-4 py-3">
                </div>
            </div>

            <div class="mt-6 flex flex-wrap gap-3">
                <button onclick="login()" class="rounded bg-[#005b4b] px-5 py-3 font-bold text-white">Login lấy token</button>
                <button onclick="addToCart()" class="rounded bg-emerald-700 px-5 py-3 font-bold text-white">Thêm vào giỏ</button>
                <button onclick="loadCart()" class="rounded bg-neutral-900 px-5 py-3 font-bold text-white">Xem giỏ hàng</button>
                <button onclick="clearCart()" class="rounded bg-red-700 px-5 py-3 font-bold text-white">Xóa toàn bộ giỏ</button>
            </div>

            <div id="message" class="mt-6 rounded bg-neutral-100 p-4 font-semibold text-neutral-700">
                Chưa thao tác.
            </div>
        </section>

        <section class="mt-8 rounded-2xl bg-white p-8 shadow">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold">Giỏ hàng</h2>
                <div class="text-right">
                    <p>Tổng số lượng: <b id="totalQuantity">0</b></p>
                    <p>Tổng tiền: <b id="totalAmount">0</b></p>
                </div>
            </div>

            <div id="cartList" class="mt-5 grid gap-4"></div>
        </section>
    </main>
</div>

<script>
    let token = "";

    function showMessage(text) {
        document.getElementById("message").innerText = text;
    }

    async function login() {
        const body = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        const response = await fetch("/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            showMessage("Login thất bại: " + response.status);
            return;
        }

        const data = await response.json();
        token = data.accessToken;
        showMessage("Login thành công, đã lấy token.");
    }

    async function ensureLogin() {
        if (!token) {
            await login();
        }
    }

    async function addToCart() {
        await ensureLogin();

        const body = {
            variantId: Number(document.getElementById("variantId").value),
            quantity: Number(document.getElementById("quantity").value)
        };

        const response = await fetch("/private/api/cart", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            showMessage("Thêm giỏ hàng thất bại: " + response.status);
            return;
        }

        showMessage("Đã thêm vào giỏ hàng.");
        await loadCart();
    }

    async function loadCart() {
        await ensureLogin();

        const response = await fetch("/private/api/cart", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!response.ok) {
            showMessage("Lấy giỏ hàng thất bại: " + response.status);
            return;
        }

        const data = await response.json();

        document.getElementById("totalQuantity").innerText = data.totalQuantity;
        document.getElementById("totalAmount").innerText = data.totalAmount;

        const list = document.getElementById("cartList");
        list.innerHTML = "";

        if (!data.items || data.items.length === 0) {
            list.innerHTML = "<p class='text-neutral-500'>Giỏ hàng đang rỗng.</p>";
            showMessage("Giỏ hàng đang rỗng.");
            return;
        }

        data.items.forEach(item => {
            list.innerHTML += `
                <div class="rounded-xl border p-5">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <p class="text-xl font-bold">${item.productName}</p>
                            <p class="mt-1 text-neutral-600">Brand: ${item.brand || ""}</p>
                            <p class="mt-1 text-neutral-600">Dung tích: ${item.variantName || ""}</p>
                            <p class="mt-1 text-neutral-600">Số lượng: ${item.quantity}</p>
                            <p class="mt-1 text-neutral-600">Thành tiền: ${item.lineTotal}</p>
                            <p class="mt-1 text-sm text-neutral-400">Item ID: ${item.itemId} | Variant ID: ${item.variantId}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="updateItem(${item.itemId})" class="rounded bg-amber-600 px-4 py-2 font-bold text-white">Sửa SL</button>
                            <button onclick="deleteItem(${item.itemId})" class="rounded bg-red-700 px-4 py-2 font-bold text-white">Xóa</button>
                        </div>
                    </div>
                </div>
            `;
        });

        showMessage("Đã tải giỏ hàng.");
    }

    async function updateItem(itemId) {
        await ensureLogin();

        const body = {
            quantity: Number(document.getElementById("quantity").value)
        };

        const response = await fetch("/private/api/cart/items/" + itemId, {
            method: "PUT",
            headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            showMessage("Sửa số lượng thất bại: " + response.status);
            return;
        }

        showMessage("Đã sửa số lượng.");
        await loadCart();
    }

    async function deleteItem(itemId) {
        await ensureLogin();

        const response = await fetch("/private/api/cart/items/" + itemId, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!response.ok) {
            showMessage("Xóa item thất bại: " + response.status);
            return;
        }

        showMessage("Đã xóa item khỏi giỏ.");
        await loadCart();
    }

    async function clearCart() {
        await ensureLogin();

        const response = await fetch("/private/api/cart", {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!response.ok) {
            showMessage("Xóa giỏ hàng thất bại: " + response.status);
            return;
        }

        showMessage("Đã xóa toàn bộ giỏ hàng.");
        await loadCart();
    }
</script>
</body>
</html>
