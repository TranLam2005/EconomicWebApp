<!DOCTYPE html>
<html layout:decorate="~{layout/layoutAdmin}" lang="vi"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<main layout:fragment="content" class="w-full min-h-screen bg-gray-50 p-6 text-gray-800">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.25em] text-[#07503D]/70">Chi tiết blog</p>
                <h1 class="text-2xl font-bold text-gray-900" th:text="${blog.title}">Tiêu đề bài viết</h1>
                <p class="text-sm text-gray-500 mt-1">
                    Slug: <span th:text="${blog.slug}">slug</span>
                </p>
            </div>
            <div class="flex gap-2">
                <a th:href="@{/local-admin/blogs(id=${blog.id})}"
                   class="rounded-lg bg-[#07503D] px-4 py-2 text-sm font-semibold text-white hover:bg-[#053b2d]">
                    Sửa bài viết
                </a>
                <a href="/local-admin/blogs"
                   class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-100">
                    Quay lại
                </a>
            </div>
        </div>

        <article class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <img th:if="${blog.featuredImage != null and !blog.featuredImage.isBlank()}"
                 th:src="${blog.featuredImage}" alt="Ảnh bài viết"
                 class="w-full max-h-[360px] object-cover">
            <div class="p-6 space-y-5">
                <div class="flex flex-wrap gap-2 text-xs font-semibold">
                    <span class="rounded-full bg-gray-100 px-3 py-1 text-gray-600"
                          th:text="${blog.category != null ? blog.category.name : 'Chưa có danh mục'}">Danh mục</span>
                    <span class="rounded-full bg-gray-100 px-3 py-1 text-gray-600"
                          th:text="${blog.author != null ? blog.author.email : 'Chưa có tác giả'}">Tác giả</span>
                    <span class="rounded-full bg-gray-100 px-3 py-1 text-gray-600"
                          th:text="${blog.viewCount == null ? 0 : blog.viewCount} + ' lượt xem'">0 lượt xem</span>
                    <span class="rounded-full px-3 py-1"
                          th:classappend="${blog.isPublished == true} ? ' bg-green-50 text-green-700' : ' bg-gray-100 text-gray-600'"
                          th:text="${blog.isPublished == true ? 'Đã đăng' : 'Đang ẩn'}">Đã đăng</span>
                </div>

                <div class="rounded-lg bg-gray-50 p-4 text-gray-600" th:if="${blog.excerpt != null and !blog.excerpt.isBlank()}"
                     th:text="${blog.excerpt}">
                    Mô tả ngắn
                </div>

                <div class="prose max-w-none whitespace-pre-line text-gray-800" th:text="${blog.content}">
                    Nội dung bài viết
                </div>
            </div>
        </article>
    </div>
</main>
</html>
