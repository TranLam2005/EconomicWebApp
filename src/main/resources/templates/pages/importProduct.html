<!DOCTYPE html>
<html
        layout:decorate="~{layout/layoutAdmin}"
        lang="vi"
        xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm sản phẩm bằng File</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<main layout:fragment="content" class="w-full mx-auto bg-gray-50 font-sans text-gray-800 h-screen p-6">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Nhập sản phẩm hàng loạt</h1>
    <p class="text-sm text-gray-500 mt-1">Tải lên tệp danh sách sản phẩm để thêm nhiều sản phẩm cùng lúc.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
      <div class="flex items-center text-sm text-gray-600">
        <svg class="w-5 h-5 text-blue-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        Chỉ hỗ trợ tệp định dạng .csv, .xls, .xlsx (Tối đa 5MB)
      </div>
      <a th:href="@{/file/filemau.xlsx}" download="filemau.xlsx" class="text-sm font-medium text-[#07503D] bg-[#07503D]/10 px-3 py-1.5 rounded-lg hover:bg-[#07503D]/20 transition-colors flex items-center shadow-sm">
        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Tải file mẫu
      </a>
    </div>

    <div class="p-8">
      <div id="message-box" class="hidden mb-6 p-4 rounded-lg border flex items-start justify-between transition-all duration-300">
        <div class="flex items-center">
          <svg id="message-icon" class="w-5 h-5 mr-3 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
          <span id="message-text" class="text-sm font-medium"></span>
        </div>
        <button type="button" id="close-message-btn" class="text-gray-400 hover:text-gray-800 ml-4 shrink-0 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <label id="dropzone" for="file-upload" class="relative block w-full border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:bg-gray-50 transition-all duration-200 cursor-pointer group">

        <input type="file" id="file-upload" class="hidden"/>

        <div id="dropzone-content" class="flex flex-col items-center justify-center pointer-events-none">
          <div class="w-16 h-16 mb-4 rounded-full bg-[#07503D]/10 flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
            <svg class="w-8 h-8 text-[#07503D]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
          </div>
          <h3 class="text-lg font-semibold text-gray-700 mb-1">Kéo thả tệp vào đây</h3>
          <p class="text-sm text-gray-500">hoặc <span class="text-[#07503D] font-medium underline">Nhấn để chọn tệp</span> từ máy tính của bạn</p>
        </div>

        <div id="file-preview" class="hidden flex-col items-center justify-center">
          <svg class="w-12 h-12 text-green-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <p id="file-name" class="text-base font-semibold text-gray-800 mb-1">filename.xlsx</p>
          <p id="file-size" class="text-sm text-gray-500 mb-4">1.2 MB</p>

          <button type="button" id="remove-file-btn" class="relative z-10 text-sm text-red-500 hover:text-red-700 font-medium px-3 py-1 rounded-md hover:bg-red-50 transition-colors">
            Xóa và chọn tệp khác
          </button>
        </div>
      </label>

      <div class="mt-8 flex justify-end space-x-3">
        <button class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium transition-colors">
          Hủy bỏ
        </button>
        <button id="submit-btn" disabled class="px-5 py-2.5 bg-[#07503D] text-white rounded-lg hover:bg-[#053d2e] font-medium transition-colors opacity-50 cursor-not-allowed shadow-sm">
          Bắt đầu nhập dữ liệu
        </button>
      </div>
    </div>
  </div>
  <script>
      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('file-upload');
      const dropzoneContent = document.getElementById('dropzone-content');
      const filePreview = document.getElementById('file-preview');
      const fileNameDisplay = document.getElementById('file-name');
      const fileSizeDisplay = document.getElementById('file-size');
      const removeFileBtn = document.getElementById('remove-file-btn');
      const submitBtn = document.getElementById('submit-btn');

      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
          dropzone.addEventListener(eventName, preventDefaults, false);
          document.body.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
          e.preventDefault();
          e.stopPropagation();
      }

      ['dragenter', 'dragover'].forEach(eventName => {
          dropzone.addEventListener(eventName, highlight, false);
      });

      ['dragleave', 'drop'].forEach(eventName => {
          dropzone.addEventListener(eventName, unhighlight, false);
      });

      function highlight(e) {
          dropzone.classList.add('border-[#07503D]', 'bg-[#07503D]/5');
          dropzone.classList.remove('border-gray-300', 'hover:bg-gray-50');
      }

      function unhighlight(e) {
          dropzone.classList.remove('border-[#07503D]', 'bg-[#07503D]/5');
          dropzone.classList.add('border-gray-300', 'hover:bg-gray-50');
      }

      dropzone.addEventListener('drop', handleDrop, false);

      function handleDrop(e) {
          const dt = e.dataTransfer;
          const files = dt.files;

          // Cập nhật giá trị cho input file khi thả file vào
          fileInput.files = files;
          handleFiles(files);
      }

      fileInput.addEventListener('change', function() {
          handleFiles(this.files);
      });

      function handleFiles(files) {
          if (files.length > 0) {
              const file = files[0];

              fileNameDisplay.textContent = file.name;
              const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
              fileSizeDisplay.textContent = sizeInMB + ' MB';

              dropzoneContent.classList.add('hidden');

              // Đổi class để hiện file preview
              filePreview.classList.remove('hidden');
              filePreview.classList.add('flex');

              submitBtn.disabled = false;
              submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
          }
      }

      removeFileBtn.addEventListener('click', (e) => {
          // Chặn sự kiện click nảy lên label làm mở hộp thoại chọn file
          e.preventDefault();
          e.stopPropagation();

          fileInput.value = '';

          dropzoneContent.classList.remove('hidden');

          // Ẩn file preview
          filePreview.classList.add('hidden');
          filePreview.classList.remove('flex');

          submitBtn.disabled = true;
          submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
      });
      submitBtn.addEventListener('click', async () => {
          // 1. Lấy file người dùng đã chọn
          const file = fileInput.files[0];
          if (!file) {
              alert("Vui lòng chọn một tệp trước khi tải lên!");
              return;
          }

          // 2. Chuẩn bị dữ liệu để gửi đi (FormData)
          const formData = new FormData();
          formData.append('files', file); // 'file' chính là tên biến mà Backend sẽ đón (RequestParam)

          // 3. Hiệu ứng Loading cho nút bấm để người dùng biết đang xử lý
          const originalText = submitBtn.innerText;
          submitBtn.innerText = 'Đang xử lý...';
          submitBtn.classList.add('opacity-75', 'cursor-wait');
          submitBtn.disabled = true;

          try {
              // 4. Gọi API bằng Fetch (Sửa lại URL /api/admin/products/import cho đúng với Backend của bạn)
              const response = await fetch('/pub/api/file/product/import', {
                  method: 'POST',
                  body: formData
              });

              // 5. Xử lý kết quả trả về từ Backend
              if (response.ok) {
                  const result = await response.json(); // Giả sử backend trả về JSON { message: "Thành công" }
                  alert("✅ Nhập dữ liệu thành công!");

                  removeFileBtn.click(); // Gọi lại nút xóa file để dọn dẹp giao diện

              } else {
                  const errorMsg = await response.json();
                  showMessage(errorMsg.message);
              }

          } catch (error) {
              console.error('Lỗi gọi API:', error);
              alert("⚠️ Không thể kết nối tới máy chủ. Vui lòng thử lại!");
          } finally {
              // 6. Trả lại trạng thái ban đầu cho nút bấm dù thành công hay thất bại
              submitBtn.innerText = originalText;
              submitBtn.classList.remove('opacity-75', 'cursor-wait');
              submitBtn.disabled = false;
          }
      });
      // ... (Các dòng code khai báo biến dropzone, fileInput... giữ nguyên)
      const messageBox = document.getElementById('message-box');
      const messageText = document.getElementById('message-text');
      const messageIcon = document.getElementById('message-icon');
      const closeMessageBtn = document.getElementById('close-message-btn');

      function showMessage(msg, isSuccess) {
          messageText.textContent = msg;

          // Reset toàn bộ class màu sắc trước khi thêm class mới
          messageBox.classList.remove('hidden', 'bg-green-50', 'text-green-800', 'border-green-200', 'bg-red-50', 'text-red-800', 'border-red-200');
          messageIcon.classList.remove('text-green-500', 'text-red-500');

          if (isSuccess) {
              // Giao diện Thành công (Xanh)
              messageBox.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
              messageIcon.classList.add('text-green-500');
              messageIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
          } else {
              // Giao diện Lỗi (Đỏ)
              messageBox.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
              messageIcon.classList.add('text-red-500');
              messageIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
          }
      }

      function hideMessage() {
          messageBox.classList.add('hidden');
      }

      // Bấm dấu X để đóng thông báo
      closeMessageBtn.addEventListener('click', hideMessage);
  </script>
</main>
</body>
</html>
