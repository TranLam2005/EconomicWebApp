<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Wishlist Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f6f2ec] text-neutral-900">
<div class="min-h-screen">
    <header class="bg-[#005b4b] px-10 py-8 text-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between">
            <div>
                <h1 class="text-4xl font-bold tracking-widest">PARFUMERIE</h1>
                <p class="mt-1 text-white/80">Demo sản phẩm yêu thích</p>
            </div>
            <div class="flex gap-4">
                <a href="/" class="rounded border border-white/40 px-4 py-2 hover:bg-white/10">Trang chủ</a>
                <a href="/cart-demo" class="rounded bg-white px-4 py-2 font-bold text-[#005b4b]">Giỏ hàng</a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-10 py-10">
        <section class="rounded-2xl bg-white p-8 shadow">
            <h2 class="text-2xl font-bold">Test API yêu thích</h2>
            <p class="mt-2 text-neutral-600">
                Trang này gọi API <b>/private/api/favorites</b> bằng JWT sau khi login user test.
            </p>

            <div class="mt-6 grid gap-4 md:grid-cols-3">
                <div>
                    <label class="mb-2 block font-semibold">Email</label>
                    <input id="email" value="dang@test.com" class="w-full rounded border px-4 py-3">
                </div>
                <div>
                    <label class="mb-2 block font-semibold">Password</label>
                    <input id="password" value="123456" type="password" class="w-full rounded border px-4 py-3">
                </div>
                <div>
                    <label class="mb-2 block font-semibold">Product ID</label>
                    <input id="productId" value="1" type="number" class="w-full rounded border px-4 py-3">
                </div>
            </div>

            <div class="mt-6 flex flex-wrap gap-3">
                <button onclick="login()" class="rounded bg-[#005b4b] px-5 py-3 font-bold text-white">Login lấy token</button>
                <button onclick="addFavorite()" class="rounded bg-rose-600 px-5 py-3 font-bold text-white">Thêm yêu thích</button>
                <button onclick="loadFavorites()" class="rounded bg-neutral-900 px-5 py-3 font-bold text-white">Xem yêu thích</button>
                <button onclick="deleteFavorite()" class="rounded bg-red-700 px-5 py-3 font-bold text-white">Xóa yêu thích</button>
            </div>

            <div id="message" class="mt-6 rounded bg-neutral-100 p-4 font-semibold text-neutral-700">
                Chưa thao tác.
            </div>
        </section>

        <section class="mt-8 rounded-2xl bg-white p-8 shadow">
            <h2 class="text-2xl font-bold">Danh sách yêu thích</h2>
            <div id="favoriteList" class="mt-5 grid gap-4"></div>
        </section>
    </main>
</div>

<script>
    let token = "";

    function showMessage(text) {
        document.getElementById("message").innerText = text;
    }

    async function login() {
        const body = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        const response = await fetch("/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            showMessage("Login thất bại: " + response.status);
            return;
        }

        const data = await response.json();
        token = data.accessToken;
        showMessage("Login thành công, đã lấy token.");
    }

    async function ensureLogin() {
        if (!token) {
            await login();
        }
    }

    async function addFavorite() {
        await ensureLogin();

        const productId = document.getElementById("productId").value;

        const response = await fetch("/private/api/favorites/" + productId, {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!response.ok) {
            showMessage("Thêm yêu thích thất bại: " + response.status);
            return;
        }

        showMessage("Đã thêm sản phẩm yêu thích.");
        await loadFavorites();
    }

    async function loadFavorites() {
        await ensureLogin();

        const response = await fetch("/private/api/favorites", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!response.ok) {
            showMessage("Lấy danh sách thất bại: " + response.status);
            return;
        }

        const data = await response.json();
        const list = document.getElementById("favoriteList");
        list.innerHTML = "";

        if (data.length === 0) {
            list.innerHTML = "<p class='text-neutral-500'>Chưa có sản phẩm yêu thích.</p>";
            showMessage("Danh sách yêu thích đang rỗng.");
            return;
        }

        data.forEach(item => {
            list.innerHTML += `
                <div class="rounded-xl border p-5">
                    <p class="text-xl font-bold">${item.productName}</p>
                    <p class="mt-1 text-neutral-600">Brand: ${item.brand || ""}</p>
                    <p class="mt-1 text-neutral-600">Giá: ${item.price || 0}</p>
                    <p class="mt-1 text-sm text-neutral-400">Favorite ID: ${item.favoriteId} | Product ID: ${item.productId}</p>
                </div>
            `;
        });

        showMessage("Đã tải danh sách yêu thích.");
    }

    async function deleteFavorite() {
        await ensureLogin();

        const productId = document.getElementById("productId").value;

        const response = await fetch("/private/api/favorites/" + productId, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!response.ok) {
            showMessage("Xóa yêu thích thất bại: " + response.status);
            return;
        }

        showMessage("Đã xóa sản phẩm yêu thích.");
        await loadFavorites();
    }
</script>
</body>
</html>
